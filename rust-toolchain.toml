# Pin Rust version for reproducible builds (CI, F-Droid, local).
# Must match src-tauri/Cargo.toml [package] rust-version (and local fdroid metadata rust line if you use one).
# 1.91+ required by current lockfile (iroh 1.0.x, iroh-blobs 0.103, etc.); bump when Cargo reports higher MSRV.
[toolchain]
channel = "1.91"
components = ["rustfmt"]
